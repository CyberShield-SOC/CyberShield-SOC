name: CyberShield SOC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cybershield
          POSTGRES_PASSWORD: cybershield
          POSTGRES_DB: cybershield_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cybershield -d cybershield_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://cybershield:cybershield@localhost:5432/cybershield_test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/